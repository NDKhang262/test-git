<section id="contact" style="padding: 60px; background: #111; color: #fff; text-align: center;">
    
    <h2 style="font-size: 36px; margin-bottom: 20px;">Liên hệ</h2>
    <p style="margin-bottom: 30px;">Bạn có thể liên hệ với tôi qua form bên dưới</p>

    <form style="max-width: 400px; margin: auto;">
        
        <input type="text" placeholder="Tên của bạn" required
        style="width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 8px;">
        
        <input type="email" placeholder="Email" required
        style="width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 8px;">
        
        <textarea placeholder="Tin nhắn..." required
        style="width: 100%; padding: 12px; height: 120px; border: none; border-radius: 8px;"></textarea>
        
        <br><br>
        
        <button type="submit"
        style="padding: 12px 30px; background: #00bcd4; border: none; border-radius: 8px; color: white; cursor: pointer;">
            Gửi ngay
        </button>

    </form>

</section>
